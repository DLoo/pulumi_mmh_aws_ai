# Pulumi.prod.yaml

config:
  aws:region: ap-southeast-1
  pulumi_mmh_aws_ai:project_name: mmh-sg-chatai
  pulumi_mmh_aws_ai:environment: prod
  
  # --- Existing Network Configuration ---
  # Replace these with your actual VPC and Subnet IDs.
  pulumi_mmh_aws_ai:existing_vpc_id: "vpc-077659deff6d913aa" # "vpc-077659deff6d913aa / sg-prd-ssa-chatai-vpc-01
  pulumi_mmh_aws_ai:existing_public_subnet_ids:
    - None  # "subnet-06970334ee9722245"  # Replace with your actual public subnet ID 1
  
  pulumi_mmh_aws_ai:existing_private_subnet_ids:
    - "subnet-04d3bb0c6078e3e03"  # "APP SUBNET 1
    - "subnet-001afdd5fece8edf1"  # "APP SUBNET 2  

  # --- EKS Cluster Configuration ---
  # pulumi_mmh_aws_ai:eks_cluster_name: mmh-aws-sg-eks-cluster
  pulumi_mmh_aws_ai:eks_cluster_version: "1.34"
  pulumi_mmh_aws_ai:eks_node_instance_types:
    - m6i.large
  pulumi_mmh_aws_ai:eks_nodegroup_instance_types:
    - m6i.xlarge

  pulumi_mmh_aws_ai:eks_node_desired_count: 1
  pulumi_mmh_aws_ai:eks_node_min_count: 1
  pulumi_mmh_aws_ai:eks_node_max_count: 4

  pulumi_mmh_aws_ai:route53_hosted_zone_id: None
  # pulumi_mmh_aws_ai:route53_hosted_zone_id: "Z008703814HR23DLTBYF"
  pulumi_mmh_aws_ai:external_dns_domains:
    - app.mmh-global.com
    # - app.musimmas.com

  